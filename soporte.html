<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Soporte Promotores - TBC VIGILA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --primary: #0056b3; 
            --secondary: #00a8cc; 
            --success: #28a745; 
            --danger: #dc3545; 
            --bg-color: #f4f7f6; 
            --white: #fff; 
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        body { background: var(--bg-color); padding: 15px; padding-top: 20px; }
        
        .header { 
            text-align: center; 
            margin-bottom: 25px; 
            background: var(--white); 
            padding: 20px 15px; 
            border-radius: 15px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); 
            position: relative;
        }
        
        .header h2 { color: var(--primary); font-size: 22px; margin-bottom: 5px; }
        .header p { color: #666; font-size: 14px; margin-bottom: 15px; }
        
        .btn-logout {
            background: #f8f9fa;
            color: #333;
            border: 1px solid #ddd;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-logout:hover {
            background: #e2e6ea;
        }
        
        .paciente-card { 
            background: var(--white); 
            border-radius: 12px; 
            padding: 18px; 
            margin-bottom: 15px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.08); 
            border-left: 6px solid #ccc; 
        }
        
        .paciente-card.alerta-verde { border-left-color: var(--success); }
        .paciente-card.alerta-roja { border-left-color: var(--danger); background-color: #fff5f5; border-right: 1px solid #ffcccc; border-top: 1px solid #ffcccc; border-bottom: 1px solid #ffcccc; }
        
        .info h3 { margin-bottom: 8px; font-size: 18px; color: #333; }
        .info p { font-size: 14px; color: #555; margin-bottom: 5px; }
        .etiqueta-roja { color: var(--danger); font-weight: bold; margin-top: 10px; display: block; background: #ffebeb; padding: 8px; border-radius: 5px; }
        
        .acciones { display: flex; gap: 10px; margin-top: 15px; }
        
        .btn-accion { 
            flex: 1; 
            padding: 12px; 
            border-radius: 8px; 
            text-align: center; 
            text-decoration: none; 
            font-weight: bold; 
            color: white; 
            font-size: 14px;
            transition: transform 0.2s;
            -webkit-appearance: none;
        }
        
        .btn-accion:active { transform: scale(0.95); }
        .btn-wa { background: #25D366; }
        .btn-call { background: var(--primary); }
        
        .cargando { text-align: center; color: #666; margin-top: 30px; font-weight: bold; }
        .sin-datos { text-align: center; color: var(--success); margin-top: 30px; padding: 20px; background: white; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Panel de Soporte</h2>
        <p>Monitoreo diario de pacientes</p>
        <button onclick="cerrarSesion()" class="btn-logout">Cerrar Sesión</button>
    </div>

    <div id="listaPacientes">
        <div class="cargando">Cargando reportes de hoy...</div>
    </div>

    <script>
        // CONFIGURACIÓN DE SUPABASE
        const supabaseUrl = 'https://idwpapyrfezyoyjhphtm.supabase.co'; 
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlkd3BhcHlyZmV6eW95amhwaHRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NTYzODMsImV4cCI6MjA5ODIzMjM4M30.o7Fl3U_3ipaAPMX2QbK0LRoQkboP3ntpTzNBtFKVEeY';        
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        // VALIDACIÓN DE SESIÓN ENLAZADA AL INDEX
        // Verifica si hay una sesión guardada y si el rol es PROMOTOR
        let usuarioActual = JSON.parse(localStorage.getItem('tbc_usuario'));
        
        if (!usuarioActual || usuarioActual.rol !== 'PROMOTOR') {
            // Si no está logueado o intenta entrar sin ser promotor, lo devuelve al index
            window.location.href = 'index.html';
        }

        // FUNCIÓN PARA CERRAR SESIÓN
        function cerrarSesion() {
            localStorage.removeItem('tbc_usuario');
            window.location.href = 'index.html';
        }

        // FUNCIÓN PARA CARGAR LOS REPORTES
        async function cargarReportes() {
            const contenedor = document.getElementById('listaPacientes');
            
            try {
                // Traer reportes ordenados del más reciente al más antiguo
                const { data, error } = await supabaseClient
                    .from('registros_diarios')
                    .select('*')
                    .order('fecha_registro', { ascending: false });

                if (error) throw error;

                contenedor.innerHTML = ''; // Limpiar estado de "Cargando"

                if (data.length === 0) {
                    contenedor.innerHTML = '<div class="sin-datos">✅ No hay reportes de pacientes registrados hoy.</div>';
                    return;
                }

                data.forEach(reporte => {
                    const esRojo = reporte.nivel_alerta === 'ROJO';
                    const claseCard = esRojo ? 'alerta-roja' : 'alerta-verde';
                    
                    // Lógica para mostrar el motivo de la alerta roja
                    let motivoAlerta = '';
                    if (esRojo) {
                        if (reporte.tomo_pastilla === 'NO' && reporte.estado_emocional === 'Ansioso/Triste') {
                            motivoAlerta = 'No tomó dosis y reporta alta ansiedad.';
                        } else if (reporte.tomo_pastilla === 'NO') {
                            motivoAlerta = 'No tomó su dosis diaria.';
                        } else {
                            motivoAlerta = 'Reporta alta ansiedad.';
                        }
                    }

                    const mensajeAlerta = esRojo ? `<span class="etiqueta-roja">⚠️ RIESGO URGENTE: ${motivoAlerta}</span>` : '';
                    
                    // Formatear mensaje predeterminado para WhatsApp
                    const msgWa = encodeURIComponent(`Hola ${reporte.nombres_paciente}, soy del equipo de soporte de TBC VIGILA PERU. He recibido tu reporte de hoy y quiero saber cómo te sientes. Estoy aquí para apoyarte en tu tratamiento.`);

                    // Formatear la fecha para que sea legible
                    const fecha = new Date(reporte.fecha_registro).toLocaleString('es-PE', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: '2-digit' });

                    const card = `
                        <div class="paciente-card ${claseCard}">
                            <div class="info">
                                <h3>${reporte.nombres_paciente}</h3>
                                <p><strong>📱 Celular:</strong> ${reporte.celular_paciente}</p>
                                <p><strong>🕒 Registrado:</strong> ${fecha}</p>
                                <hr style="border: 0; border-top: 1px solid #eee; margin: 8px 0;">
                                <p><strong>💪 Físico:</strong> ${reporte.estado_fisico} | <strong>🧠 Emocional:</strong> ${reporte.estado_emocional}</p>
                                <p><strong>🤒 Efectos:</strong> ${reporte.efectos_secundarios}</p>
                                <p><strong>💊 ¿Tomó pastilla?:</strong> ${reporte.tomo_pastilla}</p>
                                ${mensajeAlerta}
                            </div>
                            <div class="acciones">
                                <a href="https://wa.me/51${reporte.celular_paciente}?text=${msgWa}" target="_blank" class="btn-accion btn-wa">📲 WhatsApp</a>
                                <a href="tel:${reporte.celular_paciente}" class="btn-accion btn-call">📞 Llamar</a>
                            </div>
                        </div>
                    `;
                    contenedor.innerHTML += card;
                });
            } catch (error) {
                console.error("Error cargando datos:", error);
                contenedor.innerHTML = '<p style="text-align:center;color:red;font-weight:bold;">Error de conexión. Actualiza la página.</p>';
            }
        }

        // Ejecutar carga al iniciar
        cargarReportes();
    </script>
</body>
</html>
