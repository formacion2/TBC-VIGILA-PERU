<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Soporte Promotores - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    
    <style>
        :root { 
            --primary: #1e272e; --primary-light: #485460; --accent: #0fb9b1; 
            --success: #20bf6b; --danger: #eb3b5a; --warning: #f7b731; 
            --bg-body: #f4f6f8; --bg-card: #ffffff; --text-main: #2f3542; 
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        body { background: var(--bg-body); color: var(--text-main); display: flex; min-height: 100vh; }

        /* DASHBOARD SIDEBAR */
        .sidebar { width: 260px; background: var(--primary); color: white; display: flex; flex-direction: column; padding: 20px 0; transition: 0.3s; }
        .sidebar-logo { text-align: center; margin-bottom: 20px; padding: 0 20px; }
        .sidebar-logo img { max-width: 130px; background: white; border-radius: 10px; padding: 5px; }
        
        .nav-section { margin-bottom: 15px; }
        .nav-title { font-size: 11px; text-transform: uppercase; color: #7f8fa6; padding: 0 25px; margin-bottom: 5px; font-weight: bold; letter-spacing: 1px;}
        .nav-link { padding: 12px 25px; color: #ced6e0; text-decoration: none; display: block; font-weight: 600; cursor: pointer; transition: 0.2s; border-left: 4px solid transparent; font-size: 14px;}
        .nav-link:hover, .nav-link.active { background: var(--primary-light); color: white; border-left-color: var(--accent); }
        .spacer { flex-grow: 1; }
        
        /* CONTENT AREA */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; height: 100vh; }
        
        /* HEADER BAR */
        .top-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: white; padding: 15px 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .top-header h1 { font-size: 22px; color: var(--primary); }
        .header-actions { display: flex; gap: 15px; align-items: center;}
        
        /* Botones Globales */
        .btn { padding: 10px 18px; border-radius: 8px; font-weight: bold; border: none; cursor: pointer; transition: 0.2s; font-size: 14px;}
        .btn-excel { background: #218c74; color: white; display: flex; align-items: center; gap: 5px; box-shadow: 0 4px 10px rgba(33, 140, 116, 0.3);}
        .btn-excel:hover { background: #1b7360; }
        .btn-icon { background: #f1f2f6; color: var(--primary); font-size: 16px; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
        .btn-icon:hover { background: #dfe4ea; }
        .btn-logout { background: #ffefef; color: var(--danger); }
        .btn-logout:hover { background: var(--danger); color: white; }

        /* GRID CARDS */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }

        .data-card { background: var(--bg-card); border-radius: 15px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.04); border: 1px solid #eee; position: relative; }
        .data-card.urgente { border-top: 5px solid var(--danger); }
        .data-card.estable { border-top: 5px solid var(--success); }
        .data-card.cita { border-top: 5px solid var(--accent); }
        .data-card.atendido { border-top: 5px solid #a4b0be; opacity: 0.9; } /* Estilo para casos cerrados */

        .card-header { display: flex; justify-content: space-between; margin-bottom: 15px; align-items: flex-start;}
        .card-title { font-size: 18px; font-weight: bold; color: var(--primary); }
        .card-date { font-size: 12px; color: var(--text-light); }
        
        .card-body p { margin-bottom: 8px; font-size: 14px; display: flex; justify-content: space-between; border-bottom: 1px dashed #f1f2f6; padding-bottom: 5px;}
        .card-body p span { font-weight: 600; color: #555; text-align: right; max-width: 60%;}

        .badge-riesgo { background: #ffefef; color: var(--danger); padding: 8px; border-radius: 8px; font-size: 13px; font-weight: bold; text-align: center; margin: 10px 0; border: 1px solid #ffcccc;}
        .badge-cerrado { background: #f1f2f6; color: #576574; padding: 8px; border-radius: 8px; font-size: 13px; font-weight: bold; text-align: center; margin: 10px 0; }

        .card-footer { margin-top: 15px; display: flex; gap: 8px; flex-wrap: wrap;}
        .btn-wa { background: #25D366; color: white; text-decoration: none; flex: 1; text-align: center; padding: 10px; border-radius: 8px; font-weight: bold; font-size: 13px; transition: 0.2s;}
        .btn-call { background: var(--primary-light); color: white; text-decoration: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; transition: 0.2s;}
        .btn-check { background: var(--success); color: white; border: none; flex: 1; padding: 10px; border-radius: 8px; font-weight: bold; font-size: 13px; cursor: pointer; transition: 0.2s;}
        .btn-foto { background: #34495e; color: white; border: none; width: 100%; padding: 10px; border-radius: 8px; font-weight: bold; font-size: 13px; cursor: pointer; transition: 0.2s; margin-top: 5px;}
        .btn-foto:disabled { background: #bdc3c7; cursor: not-allowed; }
        .btn-wa:active, .btn-call:active, .btn-check:active, .btn-foto:active { transform: scale(0.95); }

        /* Select de Estados Cita */
        .estado-control { background: #f8f9fa; padding: 10px; border-radius: 10px; margin: 10px 0; display: flex; gap: 10px; }
        .select-estado { flex: 1; padding: 8px; border-radius: 6px; border: 1px solid #ccc; font-weight: bold; }
        .btn-guardar { background: var(--accent); color: white; border: none; border-radius: 6px; padding: 0 15px; font-weight: bold; cursor: pointer;}

        .hidden { display: none !important; }
        .empty-state { grid-column: 1 / -1; text-align: center; padding: 50px; color: var(--text-light); font-size: 16px; background: white; border-radius: 15px; }

        /* MODAL */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(5px); }
        .modal-content { background: white; padding: 30px; border-radius: 20px; text-align: center; width: 350px; max-width: 90%; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .modal-content h3 { color: var(--primary); margin-bottom: 15px; }
        .modal-content input { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 8px; margin-bottom: 15px; font-size: 15px;}
        .modal-btn { background: var(--accent); width: 100%; padding: 12px; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 10px;}
        .modal-btn-cancel { background: #eee; color: #333; }

        /* Modal Evidencia */
        .modal-evidencia { width: auto; max-width: 95%; background: transparent; box-shadow: none; padding: 0; position: relative;}
        .modal-evidencia img { max-width: 100%; max-height: 80vh; border-radius: 15px; border: 4px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn-cerrar-foto { position: absolute; top: -15px; right: -15px; background: var(--danger); color: white; border: none; width: 35px; height: 35px; border-radius: 50%; font-weight: bold; cursor: pointer; font-size: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 10;}

        /* Responsive Mobile */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; flex-direction: row; padding: 10px; align-items: center; overflow-x: auto; }
            .sidebar-logo { margin-bottom: 0; padding: 0 10px; }
            .sidebar-logo img { width: 80px; }
            .nav-section { display: flex; margin-bottom: 0; gap: 5px;}
            .nav-title { display: none; }
            .nav-link { padding: 10px; white-space: nowrap; font-size: 13px; border-left: none; border-bottom: 3px solid transparent;}
            .nav-link:hover, .nav-link.active { border-left: none; border-bottom-color: var(--accent); }
            .spacer { display: none; }
            .main-content { padding: 15px; height: auto; }
            .top-header { flex-direction: column; gap: 15px; align-items: flex-start; }
            .header-actions { width: 100%; justify-content: space-between; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-logo">
            <img src="WhatsApp_Image_2026-06-28_at_9.19.38_PM-removebg-preview.png" alt="Logo">
        </div>
        
        <div class="nav-section">
            <div class="nav-title">Reportes Diarios</div>
            <a class="nav-link active" id="tabReportes" onclick="cambiarVista('reportes')">🟠 Casos Pendientes</a>
            <a class="nav-link" id="tabReportesAtendidos" onclick="cambiarVista('reportes_atendidos')">✅ Historial Atendidos</a>
        </div>

        <div class="nav-section">
            <div class="nav-title">Citas Médicas</div>
            <a class="nav-link" id="tabCitas" onclick="cambiarVista('citas')">🟠 Solicitudes Nuevas</a>
            <a class="nav-link" id="tabCitasAtendidas" onclick="cambiarVista('citas_atendidas')">✅ Citas Cerradas</a>
        </div>
        
        <div class="spacer"></div>
    </div>

    <div class="main-content">
        
        <div class="top-header">
            <div>
                <h1 id="tituloPanel">Reportes Clínicos Diarios</h1>
                <p style="color: #747d8c; font-size: 14px; margin-top: 5px;" id="subtituloPanel">Atiende los reportes pendientes de hoy.</p>
            </div>
            <div class="header-actions">
                <button class="btn btn-excel" onclick="exportarExcel()">
                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M5.884 6.68a.5.5 0 1 0-.768.64L7.349 10l-2.233 2.68a.5.5 0 0 0 .768.64L8 10.781l2.116 2.54a.5.5 0 0 0 .768-.641L8.651 10l2.233-2.68a.5.5 0 0 0-.768-.64L8 9.219l-2.116-2.54z"/><path d="M14 14V4.5L9.5 0H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2zM9.5 3A1.5 1.5 0 0 0 11 4.5h2V14a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1h5.5v2z"/></svg>
                    Exportar Base
                </button>
                <button class="btn-icon" onclick="abrirModalPass()" title="Cambiar Contraseña">⚙️</button>
                <button class="btn btn-logout" onclick="cerrarSesion()">Salir</button>
            </div>
        </div>

        <div id="vistaReportes" class="grid-container"><div class="empty-state">Cargando...</div></div>
        <div id="vistaReportesAtendidos" class="grid-container hidden"><div class="empty-state">Cargando...</div></div>
        
        <div id="vistaCitas" class="grid-container hidden"><div class="empty-state">Cargando...</div></div>
        <div id="vistaCitasAtendidas" class="grid-container hidden"><div class="empty-state">Cargando...</div></div>

    </div>

    <div id="modalPassword" class="modal">
        <div class="modal-content">
            <h3>🔒 Cambiar Contraseña</h3>
            <p style="font-size: 13px; margin-bottom: 15px; color: #555;">Establece tu nueva contraseña de acceso al panel:</p>
            <input type="password" id="nuevaPass" placeholder="Nueva Contraseña" required>
            <button class="modal-btn" onclick="guardarNuevaContrasena()">Actualizar Contraseña</button>
            <button class="modal-btn modal-btn-cancel" onclick="cerrarModalPass()">Cancelar</button>
        </div>
    </div>

    <div id="modalFoto" class="modal">
        <div class="modal-content modal-evidencia">
            <button class="btn-cerrar-foto" onclick="cerrarModalFoto()">X</button>
            <img id="imgEvidencia" src="" alt="Evidencia del paciente">
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://idwpapyrfezyoyjhphtm.supabase.co'; 
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlkd3BhcHlyZmV6eW95amhwaHRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NTYzODMsImV4cCI6MjA5ODIzMjM4M30.o7Fl3U_3ipaAPMX2QbK0LRoQkboP3ntpTzNBtFKVEeY';        
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        let usuarioActual = JSON.parse(localStorage.getItem('tbc_usuario'));
        if (!usuarioActual || usuarioActual.rol !== 'PROMOTOR') window.location.href = 'index.html';

        let datosReportesExcel = [];
        let datosCitasExcel = [];

        function cerrarSesion() { localStorage.removeItem('tbc_usuario'); window.location.href = 'index.html'; }

        function abrirModalPass() { document.getElementById('modalPassword').style.display = 'flex'; }
        function cerrarModalPass() { document.getElementById('modalPassword').style.display = 'none'; document.getElementById('nuevaPass').value = ''; }
        
        async function guardarNuevaContrasena() {
            const nueva = document.getElementById('nuevaPass').value.trim();
            if(nueva.length < 4) { alert("La contraseña debe tener al menos 4 caracteres."); return; }
            try {
                const { error } = await supabaseClient.from('usuarios_tbc').update({ dni: nueva }).eq('id', usuarioActual.id);
                if (error) throw error;
                alert("¡Contraseña de Administrador actualizada!");
                usuarioActual.dni = nueva; 
                localStorage.setItem('tbc_usuario', JSON.stringify(usuarioActual));
                cerrarModalPass();
            } catch(e) { alert("Error al actualizar la contraseña."); }
        }

        // --- GESTIÓN DE EVIDENCIA (FOTO) ---
        function mostrarFoto(base64String) {
            document.getElementById('imgEvidencia').src = base64String;
            document.getElementById('modalFoto').style.display = 'flex';
        }

        function cerrarModalFoto() {
            document.getElementById('modalFoto').style.display = 'none';
            document.getElementById('imgEvidencia').src = '';
        }

        function cambiarVista(vista) {
            document.querySelectorAll('.grid-container').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));

            if (vista === 'reportes') {
                document.getElementById('vistaReportes').classList.remove('hidden');
                document.getElementById('tabReportes').classList.add('active');
                document.getElementById('tituloPanel').textContent = 'Reportes Pendientes';
                document.getElementById('subtituloPanel').textContent = 'Atiende los reportes clínicos diarios que requieren atención.';
                cargarReportes('pendientes');
            } else if (vista === 'reportes_atendidos') {
                document.getElementById('vistaReportesAtendidos').classList.remove('hidden');
                document.getElementById('tabReportesAtendidos').classList.add('active');
                document.getElementById('tituloPanel').textContent = 'Historial de Reportes';
                document.getElementById('subtituloPanel').textContent = 'Reportes diarios que ya han sido gestionados y cerrados.';
                cargarReportes('atendidos');
            } else if (vista === 'citas') {
                document.getElementById('vistaCitas').classList.remove('hidden');
                document.getElementById('tabCitas').classList.add('active');
                document.getElementById('tituloPanel').textContent = 'Citas Pendientes';
                document.getElementById('subtituloPanel').textContent = 'Gestiona las nuevas solicitudes de citas de los pacientes.';
                cargarCitasSoporte('pendientes');
            } else if (vista === 'citas_atendidas') {
                document.getElementById('vistaCitasAtendidas').classList.remove('hidden');
                document.getElementById('tabCitasAtendidas').classList.add('active');
                document.getElementById('tituloPanel').textContent = 'Citas Cerradas';
                document.getElementById('subtituloPanel').textContent = 'Historial de citas que ya fueron Atendidas o Rechazadas.';
                cargarCitasSoporte('atendidos');
            }
        }

        async function cargarReportes(tipo) {
            const contenedor = tipo === 'pendientes' ? document.getElementById('vistaReportes') : document.getElementById('vistaReportesAtendidos');
            contenedor.innerHTML = '<div class="empty-state">Cargando...</div>';
            
            try {
                const { data, error } = await supabaseClient.from('registros_diarios').select('*').order('fecha_registro', { ascending: false });
                if (error) throw error;
                
                datosReportesExcel = data;

                const datosFiltrados = data.filter(r => {
                    const esAtendido = r.estado_atencion === 'ATENDIDO';
                    return tipo === 'pendientes' ? !esAtendido : esAtendido;
                });

                contenedor.innerHTML = ''; 
                if (datosFiltrados.length === 0) {
                    contenedor.innerHTML = `<div class="empty-state">✅ No hay reportes ${tipo} en este momento.</div>`; return;
                }

                datosFiltrados.forEach(reporte => {
                    const esRojo = reporte.nivel_alerta === 'ROJO';
                    const bordeClase = tipo === 'atendidos' ? 'atendido' : (esRojo ? 'urgente' : 'estable');
                    
                    let motivoAlerta = '';
                    if (esRojo) {
                        if (reporte.tomo_pastilla === 'NO' && reporte.estado_emocional === 'Ansioso/Triste') motivoAlerta = 'Sin dosis y Ansiedad Alta';
                        else if (reporte.tomo_pastilla === 'NO') motivoAlerta = 'No tomó dosis diaria';
                        else motivoAlerta = 'Ansiedad Severa';
                    }

                    const badge = tipo === 'atendidos' 
                        ? `<div class="badge-cerrado">✔ Caso gestionado</div>` 
                        : (esRojo ? `<div class="badge-riesgo">⚠️ ${motivoAlerta}</div>` : '');
                    
                    const msgWa = encodeURIComponent(`Hola ${reporte.nombres_paciente}, soy de soporte de TBC VIGILA. Vi tu reporte de hoy, ¿Cómo estás?`);
                    const fecha = new Date(reporte.fecha_registro).toLocaleString('es-PE', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: 'short' });

                    // Lógica para el botón de Evidencia
                    let botonEvidencia = '';
                    if (reporte.evidencia_base64 && reporte.evidencia_base64 !== 'null') {
                        // Si hay foto, habilitar botón pasándole el string en base64
                        botonEvidencia = `<button class="btn-foto" onclick="mostrarFoto('${reporte.evidencia_base64}')">📷 Ver Evidencia</button>`;
                    } else {
                        // Si no hay foto, deshabilitar
                        botonEvidencia = `<button class="btn-foto" disabled>📷 Sin foto registrada</button>`;
                    }

                    let botonesFooter = '';
                    if(tipo === 'pendientes') {
                        botonesFooter = `
                            <a href="https://wa.me/51${reporte.celular_paciente}?text=${msgWa}" target="_blank" class="btn-wa">WhatsApp</a>
                            <a href="tel:${reporte.celular_paciente}" class="btn-call">📞</a>
                            <button class="btn-check" onclick="marcarReporteAtendido('${reporte.id}')">✔ Atendido</button>
                            ${botonEvidencia}
                        `;
                    } else {
                        botonesFooter = `
                            ${botonEvidencia}
                            <p style="width:100%; text-align:center; color:#7f8fa6; font-size:13px; font-weight:bold; margin-top:10px;">Reporte Archivado</p>
                        `;
                    }

                    contenedor.innerHTML += `
                        <div class="data-card ${bordeClase}">
                            <div class="card-header">
                                <div>
                                    <div class="card-title">${reporte.nombres_paciente}</div>
                                    <div class="card-date">${fecha}</div>
                                </div>
                            </div>
                            <div class="card-body">
                                <p>Físico: <span>${reporte.estado_fisico}</span></p>
                                <p>Emocional: <span>${reporte.estado_emocional}</span></p>
                                <p>Efectos: <span>${reporte.efectos_secundarios}</span></p>
                                <p>¿Tomó Pastilla?: <span>${reporte.tomo_pastilla}</span></p>
                                ${badge}
                            </div>
                            <div class="card-footer">
                                ${botonesFooter}
                            </div>
                        </div>
                    `;
                });
            } catch (error) { contenedor.innerHTML = '<div class="empty-state">Error cargando datos.</div>'; }
        }

        async function marcarReporteAtendido(idReporte) {
            try {
                const { error } = await supabaseClient.from('registros_diarios').update({ estado_atencion: 'ATENDIDO' }).eq('id', idReporte);
                if (error) throw error;
                cargarReportes('pendientes');
            } catch(e) { alert("Error al marcar como atendido."); }
        }

        async function cargarCitasSoporte(tipo) {
            const contenedor = tipo === 'pendientes' ? document.getElementById('vistaCitas') : document.getElementById('vistaCitasAtendidas');
            contenedor.innerHTML = '<div class="empty-state">Cargando...</div>';

            try {
                const { data, error } = await supabaseClient.from('citas_medicas').select('*').order('fecha_registro', { ascending: false });
                if (error) throw error;
                
                datosCitasExcel = data; 

                const datosFiltrados = data.filter(c => {
                    const esCerrada = (c.estado === 'ATENDIDA' || c.estado === 'RECHAZADA');
                    return tipo === 'pendientes' ? !esCerrada : esCerrada;
                });

                contenedor.innerHTML = '';
                if (datosFiltrados.length === 0) {
                    contenedor.innerHTML = `<div class="empty-state">No hay solicitudes de citas ${tipo}.</div>`; return;
                }

                datosFiltrados.forEach(cita => {
                    const fecha = new Date(cita.fecha_registro).toLocaleString('es-PE', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: 'short' });
                    const msgWa = encodeURIComponent(`Hola ${cita.nombres_paciente}, de TBC VIGILA. Te escribo por tu cita de: "${cita.motivo_cita}".`);

                    const selP = cita.estado === 'PENDIENTE' ? 'selected' : '';
                    const selA = cita.estado === 'ACEPTADA' ? 'selected' : '';
                    const selAt = cita.estado === 'ATENDIDA' ? 'selected' : '';
                    const selR = cita.estado === 'RECHAZADA' ? 'selected' : '';

                    let estadoControlHTML = '';
                    let botonContactoHTML = '';

                    if(tipo === 'pendientes') {
                        estadoControlHTML = `
                            <div class="estado-control">
                                <select id="estado_${cita.id}" class="select-estado">
                                    <option value="PENDIENTE" ${selP}>🟠 Pendiente</option>
                                    <option value="ACEPTADA" ${selA}>🔵 Aceptada</option>
                                    <option value="ATENDIDA" ${selAt}>🟢 Atendida (Cerrar)</option>
                                    <option value="RECHAZADA" ${selR}>🔴 Rechazada (Cerrar)</option>
                                </select>
                                <button class="btn-guardar" onclick="actualizarEstadoCita('${cita.id}', 'pendientes')">✔</button>
                            </div>
                        `;
                        botonContactoHTML = `<a href="https://wa.me/51${cita.celular_paciente}?text=${msgWa}" target="_blank" class="btn-wa">Coordinar Cita por WhatsApp</a>`;
                    } else {
                        let colorBadge = cita.estado === 'ATENDIDA' ? 'var(--success)' : 'var(--danger)';
                        estadoControlHTML = `<div style="margin-top:15px; text-align:center; padding:10px; background:#f1f2f6; border-radius:8px; font-weight:bold; color:${colorBadge};">Estado Final: ${cita.estado}</div>`;
                    }

                    contenedor.innerHTML += `
                        <div class="data-card ${tipo === 'atendidos' ? 'atendido' : 'cita'}">
                            <div class="card-header">
                                <div>
                                    <div class="card-title">${cita.nombres_paciente}</div>
                                    <div class="card-date">${fecha}</div>
                                </div>
                            </div>
                            <div class="card-body">
                                <p style="flex-direction: column; align-items: flex-start;">
                                    <strong style="color: var(--primary);">Motivo de Cita:</strong>
                                    <span style="text-align: left; max-width: 100%; margin-top: 5px;">${cita.motivo_cita}</span>
                                </p>
                            </div>
                            
                            ${estadoControlHTML}

                            <div class="card-footer">
                                ${botonContactoHTML}
                            </div>
                        </div>
                    `;
                });
            } catch (error) { contenedor.innerHTML = '<div class="empty-state">Error cargando citas.</div>'; }
        }

        async function actualizarEstadoCita(idCita, vistaActual) {
            const nuevoEstado = document.getElementById(`estado_${idCita}`).value;
            try {
                const { error } = await supabaseClient.from('citas_medicas').update({ estado: nuevoEstado }).eq('id', idCita);
                if (error) throw error;
                if(nuevoEstado === 'ATENDIDA' || nuevoEstado === 'RECHAZADA') {
                    alert('Cita cerrada. Se ha movido a la pestaña de Citas Cerradas.');
                } else {
                    alert('Estado actualizado correctamente.');
                }
                cargarCitasSoporte(vistaActual);
            } catch (e) { alert('Error al actualizar el estado.'); }
        }

        function exportarExcel() {
            if (datosReportesExcel.length === 0 && datosCitasExcel.length === 0) {
                alert("No hay datos para exportar en este momento.");
                return;
            }

            const wb = XLSX.utils.book_new();

            const reportesLimpios = datosReportesExcel.map(r => ({
                "Fecha Registro": new Date(r.fecha_registro).toLocaleString('es-PE'),
                "Paciente": r.nombres_paciente,
                "Celular": r.celular_paciente,
                "Estado Físico": r.estado_fisico,
                "Emocional": r.estado_emocional,
                "Efectos Secundarios": r.efectos_secundarios,
                "Tomó Dosis": r.tomo_pastilla,
                "Subió Foto": (r.evidencia_base64 && r.evidencia_base64 !== 'null') ? "SÍ" : "NO",
                "Riesgo": r.nivel_alerta,
                "Gestión": r.estado_atencion || 'PENDIENTE'
            }));
            const wsReportes = XLSX.utils.json_to_sheet(reportesLimpios);
            XLSX.utils.book_append_sheet(wb, wsReportes, "Reportes Diarios");

            const citasLimpias = datosCitasExcel.map(c => ({
                "Fecha Solicitud": new Date(c.fecha_registro).toLocaleString('es-PE'),
                "Paciente": c.nombres_paciente,
                "Celular": c.celular_paciente,
                "Motivo de Cita": c.motivo_cita,
                "Estado Actual": c.estado
            }));
            const wsCitas = XLSX.utils.json_to_sheet(citasLimpias);
            XLSX.utils.book_append_sheet(wb, wsCitas, "Citas Médicas");

            XLSX.writeFile(wb, "Base_TBC_Vigila.xlsx");
        }

        cambiarVista('reportes');
        
        supabaseClient.from('citas_medicas').select('*').order('fecha_registro', { ascending: false }).then(({data}) => {
            if(data) datosCitasExcel = data;
        });

    </script>
</body>
</html>
