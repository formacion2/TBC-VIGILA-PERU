<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>TBC VIGILA PERU - Acceso</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #0056b3;
            --secondary: #00a8cc;
            --bg-color: #f4f7f6;
            --text-color: #333;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background: var(--bg-color); min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative;
        }

        .background-shapes { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; background: linear-gradient(135deg, #e0f7fa 0%, #ffffff 100%); }
        .shape { position: absolute; filter: blur(60px); opacity: 0.6; animation: float 10s infinite alternate ease-in-out; }
        .shape.one { width: 400px; height: 400px; background: var(--secondary); top: -100px; left: -100px; border-radius: 50%; }
        .shape.two { width: 500px; height: 500px; background: var(--primary); bottom: -150px; right: -100px; border-radius: 50%; animation-delay: -5s; }

        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 50px) scale(1.1); } }

        .container { width: 92%; max-width: 420px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px); border-radius: 20px; padding: 35px 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.5); position: relative; z-index: 1; transition: transform 0.3s ease; }
        .header-title { text-align: center; margin-bottom: 25px; }
        .header-title h1 { color: var(--primary); font-size: 26px; font-weight: 800; letter-spacing: 1px; margin-bottom: 5px; }
        .header-title p { color: #666; font-size: 14px; }

        .form-section { display: none; animation: fadeIn 0.4s ease; }
        .form-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .input-group { margin-bottom: 18px; text-align: left; }
        .input-group label { display: block; margin-bottom: 6px; font-size: 13px; font-weight: 600; color: var(--text-color); }
        .input-group input, .input-group select { width: 100%; padding: 14px 15px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; background: var(--white); transition: border-color 0.3s, box-shadow 0.3s; -webkit-appearance: none; }
        .input-uppercase { text-transform: uppercase; }
        .input-group input:focus, .input-group select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.1); }

        .btn { width: 100%; padding: 15px; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: var(--white); border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; margin-top: 5px; -webkit-appearance: none; }
        .btn:active { transform: scale(0.98); }
        .btn:hover { box-shadow: 0 8px 15px rgba(0, 86, 179, 0.2); }

        .toggle-link { text-align: center; margin-top: 20px; font-size: 14px; color: #555; }
        .toggle-link span { color: var(--primary); font-weight: bold; cursor: pointer; padding: 5px; display: inline-block; }

        #alertMessage { text-align: center; margin-top: 15px; font-size: 14px; font-weight: bold; padding: 12px; border-radius: 8px; display: none; }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        @media (max-width: 480px) { .container { padding: 25px 20px; border-radius: 15px; } .header-title h1 { font-size: 24px; } .input-group { margin-bottom: 15px; } .btn { padding: 14px; } }
    </style>
</head>
<body>
    <div class="background-shapes">
        <div class="shape one"></div><div class="shape two"></div>
    </div>
    <div class="container">
        <div class="header-title">
            <h1>TBC VIGILA PERU</h1>
            <p>Plataforma de Simulación y Monitoreo</p>
        </div>

        <div id="loginForm" class="form-section active">
            <form onsubmit="iniciarSesion(event)">
                <div class="input-group">
                    <label>Usuario (Número de Celular)</label>
                    <input type="tel" id="logCelular" placeholder="Ingrese su celular" required maxlength="15">
                </div>
                <div class="input-group">
                    <label>Contraseña (DNI)</label>
                    <input type="password" id="logDni" placeholder="Ingrese su DNI" required maxlength="12">
                </div>
                <button type="submit" class="btn" id="btnLogin">Ingresar a la Plataforma</button>
            </form>
            <div class="toggle-link">¿No tienes cuenta? <span onclick="toggleForms()">Regístrate aquí</span></div>
        </div>

        <div id="registerForm" class="form-section">
            <form onsubmit="registrarUsuario(event)">
                <div class="input-group">
                    <label>Nombres Completos</label>
                    <input type="text" id="regNombres" class="input-uppercase" required oninput="this.value = this.value.toUpperCase()">
                </div>
                <div class="input-group">
                    <label>Apellidos Completos</label>
                    <input type="text" id="regApellidos" class="input-uppercase" required oninput="this.value = this.value.toUpperCase()">
                </div>
                <div class="input-group">
                    <label>Celular (Será tu Usuario)</label>
                    <input type="tel" id="regCelular" required maxlength="15">
                </div>
                <div class="input-group">
                    <label>DNI (Será tu Contraseña)</label>
                    <input type="text" id="regDni" required maxlength="12">
                </div>
                <div class="input-group">
                    <label>Perfil de Ingreso</label>
                    <select id="regRol" required>
                        <option value="" disabled selected>Seleccione su rol...</option>
                        <option value="PACIENTE">PACIENTE</option>
                        <!-- CORRECCIÓN AQUÍ: Se cambió "PROMOTORES" por "PROMOTOR" para que coincida con la base de datos -->
                        <option value="PROMOTOR">PROMOTOR</option>
                    </select>
                </div>
                <button type="submit" class="btn" id="btnRegister">Confirmar Registro</button>
            </form>
            <div class="toggle-link">¿Ya estás registrado? <span onclick="toggleForms()">Inicia sesión</span></div>
        </div>
        <div id="alertMessage"></div>
    </div>

    <script>
        const supabaseUrl = 'https://idwpapyrfezyoyjhphtm.supabase.co'; 
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlkd3BhcHlyZmV6eW95amhwaHRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NTYzODMsImV4cCI6MjA5ODIzMjM4M30.o7Fl3U_3ipaAPMX2QbK0LRoQkboP3ntpTzNBtFKVEeY';        
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        function toggleForms() {
            const login = document.getElementById('loginForm');
            const register = document.getElementById('registerForm');
            document.getElementById('alertMessage').style.display = 'none';
            if (login.classList.contains('active')) {
                login.classList.remove('active'); register.classList.add('active');
            } else {
                register.classList.remove('active'); login.classList.add('active');
            }
        }

        function mostrarAlerta(mensaje, tipo) {
            const alertDiv = document.getElementById('alertMessage');
            alertDiv.textContent = mensaje;
            alertDiv.className = tipo === 'exito' ? 'alert-success' : 'alert-error';
            alertDiv.style.display = 'block';
            setTimeout(() => { alertDiv.style.display = 'none'; }, 4000);
        }

        async function iniciarSesion(event) {
            event.preventDefault();
            const btn = document.getElementById('btnLogin'); btn.textContent = 'Validando...'; btn.disabled = true;
            const celular = document.getElementById('logCelular').value.trim();
            const dni = document.getElementById('logDni').value.trim();

            try {
                const { data, error } = await supabaseClient.from('usuarios_tbc').select('*').eq('celular', celular).eq('dni', dni);
                if (error) throw error;

                if (data.length > 0) {
                    const usuario = data[0];
                    // Guardar sesión para las otras plataformas
                    localStorage.setItem('tbc_usuario', JSON.stringify(usuario));
                    
                    mostrarAlerta(`¡Bienvenido ${usuario.nombres}! Redirigiendo...`, 'exito');
                    setTimeout(() => {
                        // Redirección dinámica y exacta según el rol
                        if(usuario.rol === 'PACIENTE') {
                            window.location.href = 'paciente.html'; 
                        } else if (usuario.rol === 'PROMOTOR') {
                            window.location.href = 'soporte.html'; 
                        }
                    }, 1500);
                } else {
                    mostrarAlerta('Credenciales incorrectas.', 'error');
                }
            } catch (error) { console.error(error); mostrarAlerta('Error de conexión.', 'error');
            } finally { btn.textContent = 'Ingresar a la Plataforma'; btn.disabled = false; }
        }

        async function registrarUsuario(event) {
            event.preventDefault();
            const btn = document.getElementById('btnRegister'); btn.textContent = 'Registrando...'; btn.disabled = true;
            const datos = {
                nombres: document.getElementById('regNombres').value.trim().toUpperCase(),
                apellidos: document.getElementById('regApellidos').value.trim().toUpperCase(),
                celular: document.getElementById('regCelular').value.trim(),
                dni: document.getElementById('regDni').value.trim(),
                rol: document.getElementById('regRol').value
            };
            try {
                const { data: existe } = await supabaseClient.from('usuarios_tbc').select('celular').eq('celular', datos.celular);
                if (existe && existe.length > 0) { mostrarAlerta('Celular ya registrado.', 'error'); return; }
                const { error } = await supabaseClient.from('usuarios_tbc').insert([datos]);
                if (error) throw error;
                mostrarAlerta('¡Registro exitoso!', 'exito');
                document.getElementById('registerForm').querySelector('form').reset();
                setTimeout(() => toggleForms(), 2000);
            } catch (error) { console.error(error); mostrarAlerta('Error al registrar. Verifica los datos.', 'error');
            } finally { btn.textContent = 'Confirmar Registro'; btn.disabled = false; }
        }
    </script>
</body>
</html>
