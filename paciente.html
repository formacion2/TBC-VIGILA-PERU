<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Control Diario - Paciente</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --primary: #0056b3; 
            --secondary: #00a8cc; 
            --danger: #dc3545; 
            --success: #28a745;
            --bg-color: #f4f7f6; 
            --white: #fff; 
            --text-dark: #2c3e50;
            --text-light: #7f8c8d;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        body { 
            background: linear-gradient(135deg, #e0f7fa 0%, #f4f7f6 100%);
            min-height: 100vh; 
            padding: 20px 15px; 
            color: var(--text-dark);
        }

        /* Cabecera superior */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding: 0 10px;
        }

        .header h2 { color: var(--primary); font-size: 24px; margin-bottom: 5px; font-weight: 800;}
        .header p { color: var(--text-light); font-size: 14px; }
        
        .btn-logout {
            background: rgba(255,255,255,0.8);
            color: var(--danger);
            border: 1px solid rgba(220, 53, 69, 0.3);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .btn-logout:hover { background: var(--danger); color: white; }

        .container { max-width: 500px; margin: 0 auto; }

        /* Estilo de Tarjetas Flotantes Dinámicas */
        .floating-card { 
            background: var(--white); 
            border-radius: 16px; 
            padding: 22px; 
            margin-bottom: 20px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.06); 
            border: 1px solid rgba(255,255,255,0.8);
        }

        /* Formulario Paso a Paso */
        .step-card { 
            display: none; 
            animation: fadeInRight 0.4s ease forwards;
        }
        .step-card.active { display: block; }

        @keyframes fadeInRight {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .floating-card label { 
            display: block; 
            font-weight: 700; 
            margin-bottom: 12px; 
            color: var(--text-dark); 
            font-size: 15px; 
        }

        select, input[type="file"] { 
            width: 100%; 
            padding: 14px 15px; 
            border: 2px solid #eef2f5; 
            border-radius: 10px; 
            font-size: 15px; 
            background: #fcfcfc; 
            color: var(--text-dark);
            transition: border-color 0.3s ease;
            -webkit-appearance: none; 
        }

        select:focus, input[type="file"]:focus {
            outline: none;
            border-color: var(--secondary);
            background: var(--white);
        }

        /* Botones de Navegación del Formulario */
        .step-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            margin-bottom: 30px;
        }

        .btn-nav {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }
        .btn-nav:active { transform: scale(0.97); }
        
        .btn-prev { background: #e2e8f0; color: #4a5568; }
        .btn-next { background: var(--secondary); color: white; }
        
        .btn-primary { 
            flex: 2;
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            color: white; 
            box-shadow: 0 6px 15px rgba(0, 86, 179, 0.2);
            display: none; /* Se oculta hasta el final */
        }

        /* Tarjeta de Geolocalización MINSA */
        .card-minsa {
            background: linear-gradient(135deg, #ffffff, #f0f9ff);
            border-left: 5px solid var(--secondary);
        }
        
        .card-minsa h3 { color: var(--primary); font-size: 17px; margin-bottom: 8px; }
        .card-minsa p { font-size: 14px; color: var(--text-light); margin-bottom: 15px; line-height: 1.4; }
        
        .btn-minsa {
            background: white;
            color: var(--primary);
            border: 2px solid var(--primary);
            padding: 12px;
            width: 100%;
            border-radius: 10px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.3s, color 0.3s;
        }
        .btn-minsa:active { background: var(--primary); color: white; }

        /* Contenedor del Mapa Integrado */
        #mapaContenedor {
            display: none;
            width: 100%;
            height: 250px;
            margin-top: 15px;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #eef2f5;
        }
        #mapaContenedor iframe { width: 100%; height: 100%; border: none; }

        /* Modal Ayuda Inteligente */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(4px); }
        .modal-content { background: white; padding: 30px 25px; border-radius: 20px; text-align: center; max-width: 90%; width: 340px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); animation: popUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .modal-content h3 { color: var(--primary); margin-bottom: 15px; font-size: 20px; }
        .modal-content p { color: var(--text-dark); font-size: 15px; line-height: 1.5; margin-bottom: 20px; }
        .modal-btn { background: var(--secondary); width: 100%; padding: 12px; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 15px; cursor: pointer; }
        
        @keyframes popUp { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        /* Indicador de pasos */
        .step-indicator { text-align: center; color: var(--text-light); font-size: 13px; font-weight: bold; margin-bottom: 10px; }

    </style>
</head>
<body>

    <div class="container">
        <div class="top-bar">
            <div class="header">
                <h2 id="saludoPaciente">Hola, Paciente</h2>
                <p>Tu control diario de salud</p>
            </div>
            <button onclick="cerrarSesion()" class="btn-logout">Salir</button>
        </div>

        <div class="floating-card card-minsa">
            <h3>📍 Centros MINSA Cercanos</h3>
            <p>Descubre la posta médica o centro de salud más cercano a tu ubicación actual sin salir de la plataforma.</p>
            <button type="button" class="btn-minsa" onclick="ubicarMinsa()">Buscar en el mapa</button>
            <div id="mapaContenedor">
                <iframe id="mapaIframe"></iframe>
            </div>
        </div>

        <div class="step-indicator" id="textoPaso">Paso 1 de 5</div>

        <form id="formDiario" onsubmit="enviarReporte(event)">
            
            <div class="floating-card step-card active">
                <label>1. ¿Cómo te sientes físicamente hoy?</label>
                <select id="fisico">
                    <option value="" disabled selected>Despliega para elegir...</option>
                    <option value="Bien">Bien, con energía</option>
                    <option value="Regular">Regular</option>
                    <option value="Mal">Mal, muy cansado</option>
                </select>
            </div>

            <div class="floating-card step-card">
                <label>2. ¿Cómo te sientes emocionalmente?</label>
                <select id="emocional">
                    <option value="" disabled selected>Despliega para elegir...</option>
                    <option value="Tranquilo/Motivado">Tranquilo / Motivado</option>
                    <option value="Ansioso/Triste">Ansioso / Triste (Siento mucha ansiedad)</option>
                </select>
            </div>

            <div class="floating-card step-card">
                <label>3. ¿Tienes algún efecto secundario?</label>
                <select id="efectos" onchange="verificarEfectos()">
                    <option value="" disabled selected>Despliega para elegir...</option>
                    <option value="Ninguno">Ninguno, todo bien</option>
                    <option value="Nauseas">Náuseas o Vómitos</option>
                    <option value="Mareos">Mareos o Vértigo</option>
                    <option value="Dolor">Dolor articular</option>
                </select>
            </div>

            <div class="floating-card step-card">
                <label>4. ¿Tomaste tu pastilla correspondiente hoy?</label>
                <select id="pastilla">
                    <option value="" disabled selected>Confirma tu dosis...</option>
                    <option value="SI">✅ Sí, ya la tomé</option>
                    <option value="NO">❌ No la he tomado / No quiero</option>
                </select>
            </div>

            <div class="floating-card step-card">
                <label>5. Sube una foto o video corto tomando tu pastilla</label>
                <input type="file" id="evidencia" accept="image/*,video/mp4">
            </div>

            <div class="step-buttons">
                <button type="button" class="btn-nav btn-prev" id="btnAtras" onclick="cambiarPaso(-1)" style="display: none;">Atrás</button>
                <button type="button" class="btn-nav btn-next" id="btnSiguiente" onclick="cambiarPaso(1)">Siguiente</button>
                <button type="submit" class="btn-nav btn-primary" id="btnEnviar">ENVIAR REPORTE</button>
            </div>
        </form>
    </div>

    <div id="modalAyuda" class="modal">
        <div class="modal-content">
            <h3>💡 Tips de Autocuidado</h3>
            <p id="textoAyuda"></p>
            <button class="modal-btn" onclick="cerrarModal()">Entendido, gracias</button>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN SUPABASE
        const supabaseUrl = 'https://idwpapyrfezyoyjhphtm.supabase.co'; 
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlkd3BhcHlyZmV6eW95amhwaHRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NTYzODMsImV4cCI6MjA5ODIzMjM4M30.o7Fl3U_3ipaAPMX2QbK0LRoQkboP3ntpTzNBtFKVEeY';        
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        // VALIDACIÓN DE SESIÓN
        let usuarioActual = JSON.parse(localStorage.getItem('tbc_usuario'));
        if(!usuarioActual || usuarioActual.rol !== 'PACIENTE') {
            window.location.href = 'index.html';
        }
        
        const primerNombre = usuarioActual.nombres.split(" ")[0];
        document.getElementById('saludoPaciente').textContent = `Hola, ${primerNombre}`;

        function cerrarSesion() {
            localStorage.removeItem('tbc_usuario');
            window.location.href = 'index.html';
        }

        // GEOLOCALIZACIÓN: MOSTRAR MAPA INTEGRADO
        function ubicarMinsa() {
            if (navigator.geolocation) {
                const btn = document.querySelector('.btn-minsa');
                const textoOriginal = btn.textContent;
                btn.textContent = "Ubicando...";
                btn.disabled = true;

                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        
                        // Cargar iframe con la búsqueda de Google Maps
                        const iframe = document.getElementById('mapaIframe');
                        iframe.src = `https://maps.google.com/maps?q=Centro+de+salud+MINSA&ll=${lat},${lon}&z=14&output=embed`;
                        
                        // Mostrar el contenedor del mapa
                        document.getElementById('mapaContenedor').style.display = 'block';
                        
                        btn.textContent = "Actualizar mapa";
                        btn.disabled = false;
                    },
                    (error) => {
                        alert("No pudimos acceder a tu GPS. Por favor, asegúrate de tener la ubicación activada.");
                        btn.textContent = textoOriginal;
                        btn.disabled = false;
                    }
                );
            } else {
                alert("Tu navegador no soporta geolocalización.");
            }
        }

        // LÓGICA DE FORMULARIO PASO A PASO
        let pasoActual = 0;
        const tarjetas = document.querySelectorAll('.step-card');
        const textoPaso = document.getElementById('textoPaso');
        const btnAtras = document.getElementById('btnAtras');
        const btnSiguiente = document.getElementById('btnSiguiente');
        const btnEnviar = document.getElementById('btnEnviar');

        function actualizarVistaPasos() {
            // Mostrar tarjeta correspondiente
            tarjetas.forEach((tarjeta, index) => {
                tarjeta.classList.toggle('active', index === pasoActual);
            });

            // Actualizar texto del indicador
            textoPaso.textContent = `Paso ${pasoActual + 1} de ${tarjetas.length}`;

            // Control de botones inferiores
            btnAtras.style.display = pasoActual === 0 ? 'none' : 'block';
            
            if (pasoActual === tarjetas.length - 1) {
                btnSiguiente.style.display = 'none';
                btnEnviar.style.display = 'block';
            } else {
                btnSiguiente.style.display = 'block';
                btnEnviar.style.display = 'none';
            }
        }

        function cambiarPaso(direccion) {
            // Validar respuesta antes de avanzar
            if (direccion === 1) {
                const tarjetaActual = tarjetas[pasoActual];
                const input = tarjetaActual.querySelector('select, input');
                if (input && !input.value) {
                    alert("Por favor, completa esta información para continuar.");
                    return;
                }
            }
            
            pasoActual += direccion;
            actualizarVistaPasos();
        }

        // Iniciar vista del primer paso
        actualizarVistaPasos();

        // AYUDA INTELIGENTE AUTOMÁTICA
        function verificarEfectos() {
            const efecto = document.getElementById('efectos').value;
            const modal = document.getElementById('modalAyuda');
            const texto = document.getElementById('textoAyuda');

            if(efecto === 'Nauseas') {
                texto.textContent = "Para las náuseas: Intenta tomar tu medicamento con alimentos muy ligeros (como galletas de soda) o toma pequeños sorbos de infusión de kión (jengibre). Mantén la cabeza levantada si te acuestas.";
                modal.style.display = 'flex';
            } else if (efecto === 'Mareos') {
                texto.textContent = "Para los mareos: Siéntate o acuéstate lentamente para evitar caídas. Evita movimientos bruscos con la cabeza y asegúrate de estar tomando suficiente agua durante el día.";
                modal.style.display = 'flex';
            }
        }
        
        function cerrarModal() { 
            document.getElementById('modalAyuda').style.display = 'none'; 
        }

        // ENVIAR REPORTE A SUPABASE
        async function enviarReporte(event) {
            event.preventDefault();
            
            // Validar el último paso manualmente (evidencia)
            const inputEvidencia = document.getElementById('evidencia');
            if (!inputEvidencia.value) {
                alert("Por favor, sube tu foto o video de evidencia antes de enviar.");
                return;
            }

            btnEnviar.textContent = 'Procesando...'; 
            btnEnviar.disabled = true;
            btnAtras.disabled = true;

            const fisico = document.getElementById('fisico').value;
            const emocional = document.getElementById('emocional').value;
            const efectos = document.getElementById('efectos').value;
            const pastilla = document.getElementById('pastilla').value;

            let alerta = 'VERDE';
            if(emocional === 'Ansioso/Triste' || pastilla === 'NO') {
                alerta = 'ROJO';
            }

            const datosReporte = {
                celular_paciente: usuarioActual.celular,
                nombres_paciente: `${usuarioActual.nombres} ${usuarioActual.apellidos}`,
                estado_fisico: fisico,
                estado_emocional: emocional,
                efectos_secundarios: efectos,
                tomo_pastilla: pastilla,
                nivel_alerta: alerta
            };

            try {
                const { error } = await supabaseClient
                    .from('registros_diarios')
                    .insert([datosReporte]);
                    
                if(error) throw error;
                
                if(alerta === 'ROJO') {
                    alert("Reporte guardado. Hemos notado que necesitas apoyo. El equipo de monitoreo ha sido alertado y se comunicarán contigo a la brevedad.");
                } else {
                    alert("¡Excelente trabajo! Has completado tu reporte diario con éxito. Sigue así.");
                }
                
                // Reiniciar formulario y volver al paso 1
                document.getElementById('formDiario').reset();
                pasoActual = 0;
                actualizarVistaPasos();

            } catch(e) {
                alert('Ocurrió un error al enviar la información. Verifica tu conexión a internet.');
                console.error(e);
            } finally {
                btnEnviar.textContent = 'ENVIAR REPORTE'; 
                btnEnviar.disabled = false;
                btnAtras.disabled = false;
            }
        }
    </script>
</body>
</html>
